<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>teleprompt-v1</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    body {
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 380px 1fr;
      min-height: 100vh;
    }

    .panel {
      padding: 16px;
    }

    .left {
      background: #1b1b1b;
      border-right: 1px solid #333;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
    }

    textarea {
      width: 100%;
      height: 48vh;
      padding: 12px;
      font-size: 16px;
      resize: vertical;
      border: 1px solid #444;
      border-radius: 8px;
      background: #0f0f0f;
      color: #fff;
    }

    .controls {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 10px 14px;
      font-size: 16px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
    }

    .value {
      font-size: 14px;
      color: #bbb;
    }

    .right {
      background: #000;
      padding: 16px;
    }

    .stage {
      height: calc(100vh - 32px);
      overflow: hidden;
      border: 1px solid #222;
      border-radius: 12px;
      background: #000;
      position: relative;
    }

    .script {
      white-space: pre-wrap;
      padding: 45vh 8vw 35vh;
      line-height: 1.6;
      font-size: 40px;
      color: #fff;
    }

    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel left">
      <h1>teleprompt-v1</h1>

      <textarea id="scriptInput">Paste your script here.

This is version one.
Simple.
Useful.
Published on GitHub Pages.</textarea>

      <div class="controls">
        <div class="button-row">
          <button id="toggleBtn">Start</button>
          <button id="resetBtn">Reset</button>
          <button id="fullscreenBtn">Full screen</button>
        </div>

        <label>
          Speed
          <input id="speedInput" type="range" min="25" max="200" value="40">
          <span class="value" id="speedValue">40 px/sec</span>
        </label>

        <label>
          Font size
          <input id="fontInput" type="range" min="24" max="72" value="40">
          <span class="value" id="fontValue">40 px</span>
        </label>
      </div>

      <div class="hint">
        Paste text on the left. Read from the right.
      </div>
    </div>

    <div class="panel right">
      <div class="stage" id="stage">
        <div class="script" id="scriptDisplay"></div>
      </div>
    </div>
  </div>

  <script>
    const scriptInput = document.getElementById('scriptInput');
    const scriptDisplay = document.getElementById('scriptDisplay');
    const stage = document.getElementById('stage');

    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const fullscreenBtn = document.getElementById('fullscreenBtn');

    const speedInput = document.getElementById('speedInput');
    const speedValue = document.getElementById('speedValue');

    const fontInput = document.getElementById('fontInput');
    const fontValue = document.getElementById('fontValue');

    let isRunning = false;
    let lastTime = 0;

    function updateText() {
      scriptDisplay.textContent = scriptInput.value || 'Paste your script here.';
    }

    function updateSpeed() {
      speedValue.textContent = speedInput.value + ' px/sec';
    }

    function updateFont() {
      scriptDisplay.style.fontSize = fontInput.value + 'px';
      fontValue.textContent = fontInput.value + ' px';
    }

    function tick(timestamp) {
      if (!isRunning) return;

      if (!lastTime) lastTime = timestamp;
      const delta = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      const speed = Number(speedInput.value);
      stage.scrollTop += speed * delta;

      const reachedBottom = stage.scrollTop + stage.clientHeight >= stage.scrollHeight - 2;
      if (reachedBottom) {
        pauseScrolling();
        return;
      }

      requestAnimationFrame(tick);
    }

    function startScrolling() {
      if (isRunning) return;
      isRunning = true;
      lastTime = 0;
      toggleBtn.textContent = 'Pause';
      requestAnimationFrame(tick);
    }

    function pauseScrolling() {
      isRunning = false;
      lastTime = 0;
      toggleBtn.textContent = 'Start';
    }

    function resetScrolling() {
      pauseScrolling();
      stage.scrollTop = 0;
    }

    async function toggleFullscreen() {
      if (!document.fullscreenElement) {
        await stage.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    }

    scriptInput.addEventListener('input', updateText);
    speedInput.addEventListener('input', updateSpeed);
    fontInput.addEventListener('input', updateFont);

    toggleBtn.addEventListener('click', () => {
      if (isRunning) {
        pauseScrolling();
      } else {
        startScrolling();
      }
    });

    resetBtn.addEventListener('click', resetScrolling);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    updateText();
    updateSpeed();
    updateFont();
  </script>
</body>
</html>
